name: Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v5.1.0)'
        required: true

concurrency:
  group: publish
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Step 1: Build native binary per platform ───────────────────────────────
  build-native:
    name: Build native (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: native-linux-x64-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: native-linux-arm64-gnu
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: native-darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: native-darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: native-win32-x64-msvc
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          cache-workspaces: native

      - name: Install cross (Linux ARM64)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build native (cross)
        if: matrix.cross
        run: cd native && napi build --release --target ${{ matrix.target }} --use-napi-cross

      - name: Build native (native)
        if: '!matrix.cross'
        run: cd native && napi build --release --target ${{ matrix.target }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: native/tailwind-styled-native.*.node
          retention-days: 1

  # ── Step 2: Publish ke NPM ─────────────────────────────────────────────────
  publish:
    name: Publish to NPM
    needs: [build-native]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download all native binaries
        uses: actions/download-artifact@v4
        with:
          path: native/
          merge-multiple: true

      - name: Build TypeScript
        run: npm run build

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: native/*.node
