name: Dependencies

on:
  schedule:
    - cron: '0 9 * * 1'  # Monday 09:00 UTC
  workflow_dispatch:

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: cargo audit
        run: |
          cargo install cargo-audit --quiet
          cd native && cargo audit

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

  outdated:
    name: Outdated Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: npm outdated
        run: npm outdated --depth=0
        continue-on-error: true

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: cargo outdated
        run: |
          cargo install cargo-outdated --quiet
          cargo outdated --manifest-path native/Cargo.toml
        continue-on-error: true