name: CLI Integration Tests

on:
  push:
    branches: [main, tailwnd-js-css, alpha]
    paths:
      - 'packages/infrastructure/cli/**'
      - 'packages/domain/core/**'
      - '.github/workflows/cli-test.yml'
  pull_request:
    branches: [main, tailwnd-js-css]
    paths:
      - 'packages/infrastructure/cli/**'
  workflow_dispatch:

concurrency:
  group: cli-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cli-integration:
    name: CLI Integration (${{ matrix.os }} / Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache-workspaces: native

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Rust native
        run: npm run build:rust

      - name: Build all packages
        run: npm run build:packages

      - name: Build CLI
        run: npm run build -w create-tailwind-styled

      # ── Smoke tests: setiap command harus exit 0 atau print help ──────────

      - name: tw --version
        run: node packages/infrastructure/cli/dist/index.js --version

      - name: tw --help
        run: node packages/infrastructure/cli/dist/index.js --help

      - name: tw preflight (dry-run)
        run: node packages/infrastructure/cli/dist/index.js preflight --dry-run
        continue-on-error: true

      - name: tw scan --help
        run: node packages/infrastructure/cli/dist/index.js scan --help

      - name: tw analyze --help
        run: node packages/infrastructure/cli/dist/index.js analyze --help

      - name: tw migrate --help
        run: node packages/infrastructure/cli/dist/index.js migrate --help

      - name: tw init --help
        run: node packages/infrastructure/cli/dist/index.js init --help

      # ── Full integration: setup di temp project ───────────────────────────

      - name: Create temp project
        run: |
          mkdir -p /tmp/tw-test-app
          cd /tmp/tw-test-app
          echo '{"name":"tw-test","version":"1.0.0","private":true}' > package.json
        shell: bash

      - name: tw setup (non-interactive)
        run: |
          node ${{ github.workspace }}/packages/infrastructure/cli/dist/index.js \
            setup \
            --cwd /tmp/tw-test-app \
            --framework none \
            --skip-install \
            --yes
        shell: bash
        continue-on-error: true

      - name: tw scan on temp project
        run: |
          node ${{ github.workspace }}/packages/infrastructure/cli/dist/index.js \
            scan \
            --cwd /tmp/tw-test-app \
            --json
        shell: bash
        continue-on-error: true

      - name: Verify CLI output is valid JSON
        run: |
          node ${{ github.workspace }}/packages/infrastructure/cli/dist/index.js \
            scan \
            --cwd /tmp/tw-test-app \
            --json 2>/dev/null | node -e "
            let d='';
            process.stdin.on('data', c => d += c);
            process.stdin.on('end', () => {
              try { JSON.parse(d); console.log('JSON output: valid'); }
              catch { console.log('JSON output: empty or invalid (ok for empty project)'); }
            });
          "
        shell: bash
        continue-on-error: true

  # ── Unit tests untuk CLI package ─────────────────────────────────────────
  cli-unit:
    name: CLI Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache-workspaces: native

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build native
        run: npm run build:rust

      - name: Build packages
        run: npm run build:packages

      - name: Build CLI
        run: npm run build -w create-tailwind-styled

      - name: Run CLI tests
        run: npm test -w create-tailwind-styled --if-present

      - name: Test npx invocation
        run: |
          cd packages/infrastructure/cli
          node dist/index.js --version
          node dist/index.js --help
