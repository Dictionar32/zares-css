name: Benchmark

on:
  push:
    branches: [main, tailwnd-js-css]
    paths:
      - 'native/src/**'
      - 'packages/domain/core/src/**'
  schedule:
    - cron: '0 2 * * 0'  # Weekly Sunday 02:00 UTC
  workflow_dispatch:

concurrency:
  group: benchmark
  cancel-in-progress: true

jobs:
  bench:
    name: Benchmark (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install MSVC Build Tools (Windows only)
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache-workspaces: native

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build native (release)
        run: npm run build:rust

      - name: Run Rust benchmarks
        run: cargo bench --manifest-path native/Cargo.toml 2>&1 | tee bench-${{ matrix.os }}.txt

      - name: Run TS benchmarks
        run: npm run bench --if-present 2>&1 | tee bench-ts-${{ matrix.os }}.txt

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: bench-results-${{ matrix.os }}
          path: bench-*.txt
          retention-days: 30