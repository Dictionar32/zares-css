name: Bug report
description: Laporkan bug pada tailwind-styled-v4
labels: [bug]
body:
  - type: textarea
    id: desc
    attributes:
      label: Deskripsi bug
      placeholder: Jelaskan masalah yang terjadi
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Langkah reproduksi
      placeholder: 1. ... 2. ...
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: OS, Node version, package versions
